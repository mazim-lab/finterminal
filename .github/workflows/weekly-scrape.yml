name: Weekly Card Scraper

# ⚠️ PAUSED (2026-06-17). The automated bank scrapers are no longer fetching
# fresh data — the per-bank source files have not changed since March, yet the
# job was committing a weekly "update" that only re-stamped each card's
# `last_updated` to the current date (false freshness). It also wrote to a
# `website/src/data/` directory that Vercel never builds. The schedule is
# disabled until the data pipeline is rebuilt on a stable API source (e.g.
# Prince of Travel / CreditCardGenius). Run manually via "Run workflow" only if
# you know the scrapers have been fixed. See ARCHITECTURE.md / data notes.

on:
  # schedule:
  #   # Run every Sunday at 6 AM UTC (1 AM EST) — disabled, see note above.
  #   - cron: '0 6 * * 0'
  workflow_dispatch: # Manual trigger only

permissions:
  contents: write

jobs:
  scrape:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: |
          pip install playwright
          playwright install chromium firefox
          playwright install-deps

      - name: Run scraper
        run: python scrapers/bank_scraper.py --all

      - name: Build comprehensive databases
        run: python scrapers/bank_scraper.py --build

      - name: Check for changes
        id: changes
        run: |
          git diff --name-only data/ src/data/ > /tmp/changed_files.txt
          if [ -s /tmp/changed_files.txt ]; then
            echo "has_changes=true" >> $GITHUB_OUTPUT
            echo "Changed files:"
            cat /tmp/changed_files.txt
          else
            echo "has_changes=false" >> $GITHUB_OUTPUT
            echo "No changes detected."
          fi

      - name: Commit and push changes
        if: steps.changes.outputs.has_changes == 'true'
        run: |
          git config user.name "FinTerminal Bot"
          git config user.email "bot@finterminal.ca"
          git add data/ src/data/
          git commit -m "chore: weekly card data update $(date +%Y-%m-%d)"
          git push

      - name: Deploy to Vercel
        if: steps.changes.outputs.has_changes == 'true'
        run: echo "Vercel auto-deploys on push to main"
